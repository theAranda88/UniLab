<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plataforma Universitaria</title>
<!-- Iconos de Tabler para que se rendericen correctamente -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">

<style>
/* 🎨 Variables de color agregadas para activar tu diseño oscuro */
:root {
  --font-sans: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  --surface-0: #121212;       /* Fondo general */
  --surface-1: #1a1a1a;       /* Fondo Sidebar */
  --surface-2: #222222;       /* Fondo Tarjetas y campos */
  --border: #2d2d2d;          /* Bordes de separación */
  --radius: 8px;

  /* Colores de Texto */
  --text-primary: #ffffff;
  --text-secondary: #b3b3b3;
  --text-muted: #666666;

  /* Estados y Acentos */
  --bg-accent: rgba(13, 110, 253, 0.15);
  --border-accent: #0d6efd;
  --text-accent: #3b82f6;
  --fill-accent: #0d6efd;
  --on-accent: #ffffff;

  --bg-success: rgba(34, 197, 94, 0.15);
  --text-success: #22c55e;
  --bg-warning: rgba(234, 179, 8, 0.15);
  --text-warning: #eab308;
  --bg-danger: rgba(239, 68, 68, 0.15);
  --text-danger: #ef4444;
}

/* 💻 Tus estilos CSS originales */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans); background-color: #09090b; padding: 40px; display: flex; justify-content: center; align-items: center; min-height: 100vh;}
.shell{display:flex;width: 100%; max-width: 1150px; height:600px;border:0.5px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface-0)}
.sidebar{width:220px;background:var(--surface-1);border-right:0.5px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.logo-area{padding:16px;border-bottom:0.5px solid var(--border)}
.logo-text{font-size:13px;font-weight:500;color:var(--text-primary);line-height:1.3}
.logo-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.role-tabs{display:flex;gap:4px;padding:10px;border-bottom:0.5px solid var(--border)}
.rtab{flex:1;font-size:10px;padding:5px 2px;border:0.5px solid var(--border);border-radius:var(--radius);background:transparent;color:var(--text-secondary);cursor:pointer;text-align:center;transition:all .15s}
.rtab.active{background:var(--bg-accent);border-color:var(--border-accent);color:var(--text-accent);font-weight:500}
.nav{flex:1;overflow-y:auto;padding:8px}
.nav-section{margin-bottom:12px}
.nav-label{font-size:10px;font-weight:500;color:var(--text-muted);padding:4px 8px;letter-spacing:.05em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text-secondary);transition:all .12s}
.nav-item:hover{background:var(--surface-2);color:var(--text-primary)}
.nav-item.active{background:var(--bg-accent);color:var(--text-accent)}
.nav-item i{font-size:15px;width:16px;flex-shrink:0}
.nav-item .badge{margin-left:auto;font-size:10px;background:var(--bg-danger);color:var(--text-danger);padding:1px 6px;border-radius:10px}
.sidebar-footer{padding:12px;border-top:0.5px solid var(--border)}
.user-pill{display:flex;align-items:center;gap:8px}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.user-name{font-size:12px;font-weight:500;color:var(--text-primary)}
.user-role{font-size:10px;color:var(--text-muted)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:0.5px solid var(--border);background:var(--surface-0)}
.page-title{font-size:15px;font-weight:500;color:var(--text-primary)}
.topbar-actions{display:flex;align-items:center;gap:8px}
.tb-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border:0.5px solid var(--border);border-radius:var(--radius);background:transparent;cursor:pointer;font-size:12px;color:var(--text-secondary)}
.tb-btn:hover{background:var(--surface-1)}
.tb-btn.primary{background:var(--fill-accent);border-color:var(--fill-accent);color:var(--on-accent)}
.content{flex:1;padding:20px;overflow-y:auto;display:grid;gap:16px;align-content:start}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat-card{background:var(--surface-1);border:0.5px solid var(--border);border-radius:12px;padding:14px}
.stat-label{font-size:11px;color:var(--text-muted);margin-bottom:6px}
.stat-num{font-size:22px;font-weight:500;color:var(--text-primary)}
.stat-sub{font-size:11px;color:var(--text-secondary);margin-top:2px}
.stat-accent{color:var(--text-accent)}
.bottom-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:var(--surface-1);border:0.5px solid var(--border);border-radius:12px;padding:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:13px;font-weight:500;color:var(--text-primary)}
.card-link{font-size:11px;color:var(--text-accent);cursor:pointer}
.list-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--border)}
.list-item:last-child{border-bottom:none}
.li-icon{width:28px;height:28px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.li-main{flex:1;min-width:0}
.li-title{font-size:12px;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-sub{font-size:11px;color:var(--text-muted)}
.pill{font-size:10px;padding:2px 8px;border-radius:10px;white-space:nowrap}
.pill-pub{background:var(--bg-success);color:var(--text-success)}
.pill-rev{background:var(--bg-warning);color:var(--text-warning)}
.pill-pen{background:var(--bg-danger);color:var(--text-danger)}
.pill-ok{background:var(--bg-success);color:var(--text-success)}
.hidden{display:none}
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0; }
</style>
</head>
<body>

<h2 class="sr-only">Propuesta de panel administrativo con navegación por rol</h2>

<div class="shell">
  <div class="sidebar">
    <div class="logo-area">
      <div class="logo-text">Plataforma Universitaria</div>
      <div class="logo-sub">Panel de gestión</div>
    </div>
    <div class="role-tabs">
      <button class="rtab active" onclick="setRole('admin')">Admin</button>
      <button class="rtab" onclick="setRole('coord')">Coord.</button>
      <button class="rtab" onclick="setRole('prof')">Profesor</button>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-footer">
      <div class="user-pill">
        <div class="avatar" id="user-av" style="background:var(--bg-accent);color:var(--text-accent)">AD</div>
        <div>
          <div class="user-name" id="user-name">Administrador</div>
          <div class="user-role" id="user-role">Acceso completo</div>
        </div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <span class="page-title" id="page-title">Dashboard general</span>
      <div class="topbar-actions">
        <button class="tb-btn"><i class="ti ti-bell" aria-hidden="true"></i></button>
        <button class="tb-btn"><i class="ti ti-settings" aria-hidden="true"></i></button>
        <button class="tb-btn primary" id="main-cta"><i class="ti ti-plus" aria-hidden="true"></i> <span id="cta-label">Crear usuario</span></button>
      </div>
    </div>
    <div class="content" id="content">
      <div class="stats-row" id="stats-row"></div>
      <div class="bottom-row">
        <div class="card" id="card-left"></div>
        <div class="card" id="card-right"></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ⚙️ Tu JavaScript intacto y reparado */
const roles={
  admin:{
    label:'Administrador',initials:'AD',sub:'Acceso completo',
    cta:'Crear usuario',
    nav:[
      {section:'General',items:[
        {icon:'ti-layout-dashboard',label:'Dashboard',active:true},
        {icon:'ti-users',label:'Usuarios',badge:3},
        {icon:'ti-school',label:'Escuelas y carreras'},
        {icon:'ti-book',label:'Cursos'},
      ]},
      {section:'Académico',items:[
        {icon:'ti-folders',label:'Proyectos'},
        {icon:'ti-flask',label:'Semilleros'},
      ]},
      {section:'Eventos',items:[
        {icon:'ti-calendar-event',label:'Eventos'},
        {icon:'ti-qrcode',label:'Control de asistencia'},
      ]},
      {section:'Sistema',items:[
        {icon:'ti-chart-bar',label:'Reportes'},
        {icon:'ti-settings',label:'Configuración'},
      ]},
    ],
    stats:[
      {label:'Usuarios activos',num:'284',sub:'↑ 12 este mes',accent:true},
      {label:'Proyectos publicados',num:'147',sub:'32 en revisión'},
      {label:'Semilleros activos',num:'9',sub:'3 escuelas'},
      {label:'Eventos próximos',num:'4',sub:'1 esta semana'},
    ],
    left:{
      title:'Últimos proyectos',link:'Ver todos',
      items:[
        {icon:'ti-world',bg:'var(--bg-accent)',c:'var(--text-accent)',title:'App de gestión ambiental',sub:'Ing. Software · Carlos R.',pill:{txt:'Publicado',cls:'pill-pub'}},
        {icon:'ti-microphone',bg:'var(--bg-warning)',c:'var(--text-warning)',title:'Podcast: Finanzas para todos',sub:'Negocios · Ana M.',pill:{txt:'En revisión',cls:'pill-rev'}},
        {icon:'ti-device-mobile',bg:'var(--bg-success)',c:'var(--text-success)',title:'App de seguimiento deportivo',sub:'Educación · Luis T.',pill:{txt:'Publicado',cls:'pill-pub'}},
      ]
    },
    right:{
      title:'Inscripciones pendientes',link:'Gestionar',
      items:[
        {icon:'ti-user',bg:'var(--bg-danger)',c:'var(--text-danger)',title:'Congreso TIC 2026',sub:'14 pagos pendientes',pill:{txt:'Pendiente',cls:'pill-pen'}},
        {icon:'ti-user',bg:'var(--bg-warning)',c:'var(--text-warning)',title:'Foro de Derecho',sub:'6 por confirmar',pill:{txt:'Pendiente',cls:'pill-pen'}}, // Aquí se reparó el error de tipeo original c(--text-warning) -> c:'var(--text-warning)'
        {icon:'ti-user',bg:'var(--bg-success)',c:'var(--text-success)',title:'Seminario de Datos',sub:'Todos confirmados',pill:{txt:'Completo',cls:'pill-ok'}},
      ]
    }
  },
  coord:{
    label:'Coordinador',initials:'CO',sub:'Vista analítica',
    cta:'Exportar reporte',
    nav:[
      {section:'Análisis',items:[
        {icon:'ti-layout-dashboard',label:'Dashboard',active:true},
        {icon:'ti-chart-pie',label:'Estadísticas'},
        {icon:'ti-file-export',label:'Exportar reportes'},
      ]},
      {section:'Seguimiento',items:[
        {icon:'ti-folders',label:'Proyectos'},
        {icon:'ti-flask',label:'Semilleros'},
        {icon:'ti-users',label:'Profesores'},
        {icon:'ti-school',label:'Estudiantes'},
      ]},
      {section:'Eventos',items:[
        {icon:'ti-calendar-event',label:'Eventos'},
        {icon:'ti-chart-bar',label:'Asistencia'},
      ]},
    ],
    stats:[
      {label:'Proyectos totales',num:'147',sub:'↑ 8 este periodo',accent:true},
      {label:'Calificación promedio',num:'4.2',sub:'sobre 5.0'},
      {label:'Total de vistas',num:'12.4k',sub:'proyectos publicados'},
      {label:'Eventos realizados',num:'11',sub:'este año'},
    ],
    left:{
      title:'Proyectos por escuela',link:'Ver detalle',
      items:[
        {icon:'ti-code',bg:'var(--bg-accent)',c:'var(--text-accent)',title:'Esc. Software y Tecnología',sub:'54 proyectos · 4.4 ★',pill:{txt:'↑ 23%',cls:'pill-ok'}},
        {icon:'ti-building',bg:'var(--bg-warning)',c:'var(--text-warning)',title:'Esc. Ingeniería y Sosten.',sub:'38 proyectos · 4.1 ★',pill:{txt:'↑ 11%',cls:'pill-rev'}},
        {icon:'ti-cash',bg:'var(--bg-success)',c:'var(--text-success)',title:'Esc. de Negocios',sub:'31 proyectos · 4.3 ★',pill:{txt:'↑ 9%',cls:'pill-ok'}},
      ]
    },
    right:{
      title:'Semilleros activos',link:'Ver todos',
      items:[
        {icon:'ti-flask',bg:'var(--bg-accent)',c:'var(--text-accent)',title:'Semillero de IA y Datos',sub:'12 estudiantes · 3 proyectos',pill:{txt:'Activo',cls:'pill-ok'}},
        {icon:'ti-leaf',bg:'var(--bg-success)',c:'var(--text-success)',title:'Semillero Ambiental',sub:'8 estudiantes · 2 proyectos',pill:{txt:'Activo',cls:'pill-ok'}},
        {icon:'ti-scale',bg:'var(--bg-warning)',c:'var(--text-warning)',title:'Semillero de Derecho',sub:'5 estudiantes · 1 proyecto',pill:{txt:'Activo',cls:'pill-ok'}},
      ]
    }
  },
  prof:{
    label:'Profesor',initials:'PR',sub:'Gestión académica',
    cta:'Autorizar estudiante',
    nav:[
      {section:'Mi gestión',items:[
        {icon:'ti-layout-dashboard',label:'Mi panel',active:true},
        {icon:'ti-flask',label:'Mis semilleros'},
        {icon:'ti-users-group',label:'Mis estudiantes',badge:2},
      ]},
      {section:'Proyectos',items:[
        {icon:'ti-folders',label:'Proyectos asignados'},
        {icon:'ti-clock-check',label:'Pendientes de aprobar',badge:2},
      ]},
      {section:'Recursos',items:[
        {icon:'ti-school',label:'Cursos y carreras'},
        {icon:'ti-calendar-event',label:'Eventos'},
      ]},
    ],
    stats:[
      {label:'Estudiantes activos',num:'28',sub:'en mis semilleros',accent:true},
      {label:'Proyectos asignados',num:'14',sub:'3 por aprobar'},
      {label:'Autorizaciones dadas',num:'11',sub:'este semestre'},
      {label:'Comentarios dados',num:'47',sub:'en proyectos'},
    ],
    left:{
      title:'Estudiantes por autorizar',link:'Ver todos',
      items:[
        {icon:'ti-user',bg:'var(--bg-warning)',c:'var(--text-warning)',title:'Sofía Martínez',sub:'Semillero IA · solicitud de publicar',pill:{txt:'Pendiente',cls:'pill-rev'}},
        {icon:'ti-user',bg:'var(--bg-warning)',c:'var(--text-warning)',title:'Andrés Cárdenas',sub:'Física I · solicitud de subir proyecto',pill:{txt:'Pendiente',cls:'pill-rev'}},
        {icon:'ti-user',bg:'var(--bg-success)',c:'var(--text-success)',title:'Valentina Cruz',sub:'Cálculo II · ya autorizada',pill:{txt:'Listo',cls:'pill-ok'}},
      ]
    },
    right:{
      title:'Proyectos en revisión',link:'Revisar',
      items:[
        {icon:'ti-world',bg:'var(--bg-accent)',c:'var(--text-accent)',title:'Sistema de riego inteligente',sub:'Ing. Civil · enviado hoy',pill:{txt:'En revisión',cls:'pill-rev'}},
        {icon:'ti-device-mobile',bg:'var(--bg-warning)',c:'var(--text-warning)',title:'App de rutas verdes',sub:'Ing. Ambiental · enviado ayer',pill:{txt:'En revisión',cls:'pill-rev'}},
        {icon:'ti-chart-bar',bg:'var(--bg-success)',c:'var(--text-success)',title:'Dashboard financiero',sub:'Contabilidad · revisado',pill:{txt:'Aprobado',cls:'pill-pub'}},
      ]
    }
  }
}

function setRole(r){
  document.querySelectorAll('.rtab').forEach((t,i)=>t.classList.toggle('active',['admin','coord','prof'][i]===r))
  const d=roles[r]
  document.getElementById('user-name').textContent=d.label
  document.getElementById('user-role').textContent=d.sub
  document.getElementById('user-av').textContent=d.initials
  document.getElementById('cta-label').textContent=d.cta

  const nav=document.getElementById('nav')
  nav.innerHTML=d.nav.map(s=>`
    <div class="nav-section">
      <div class="nav-label">${s.section}</div>
      ${s.items.map(it=>`
        <div class="nav-item${it.active?' active':''}">
          <i class="ti ${it.icon}" aria-hidden="true"></i>
          ${it.label}
          ${it.badge?`<span class="badge">${it.badge}</span>`:''}
        </div>
      `).join('')}
    </div>
  `).join('')

  const sr=document.getElementById('stats-row')
  sr.innerHTML=d.stats.map(s=>`
    <div class="stat-card">
      <div class="stat-label">${s.label}</div>
      <div class="stat-num${s.accent?' stat-accent':''}">${s.num}</div>
      <div class="stat-sub">${s.sub}</div>
    </div>
  `).join('')

  function renderCardFixed(id,data){
    document.getElementById(id).innerHTML=`
      <div class="card-header">
        <span class="card-title">${data.title}</span>
        <span class="card-link">${data.link} →</span>
      </div>
      ${data.items.map(it=>`
        <div class="list-item">
          <div class="li-icon" style="background:${it.bg};color:${it.c}">
            <i class="ti ${it.icon}" aria-hidden="true"></i>
          </div>
          <div class="li-main">
            <div class="li-title">${it.title}</div>
            <div class="li-sub">${it.sub}</div>
          </div>
          <span class="pill ${it.pill.cls}">${it.pill.txt}</span>
        </div>
      `).join('')}
    `
  }
  renderCardFixed('card-left',d.left)
  renderCardFixed('card-right',d.right)
}
setRole('admin')
</script>
</body>
</html>
